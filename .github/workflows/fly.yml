name: Fly Deploy

on: push

# on:
#   release:
#     types: [created]

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Install node
        uses: actions/setup-node@v1
        with:
          node-version: 16.x

      - name: Run deploy prep script
        run: sh deploy.sh

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
