name: main

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] #, windows-latest, macos-latest]
        python-version: [3.9] #[3.8, 3.9]

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: github_actions
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install rcal
        run: |
          eval `ssh-agent -s`
          ssh-add - <<< '${{ secrets.RCAL_SECRET_KEY }}'
          pip install git+ssh://git@github.com/jtiosue/rcal.git
      - name: Run migrations
        run: python manage.py migrate
      - name: Run tests
        # PYTHONHASHSEED=0 pins Python's hash randomization so that set
        # iteration order is deterministic. rcal's _calibrate.py enumerates
        # unordered sets to decide which rater's offset is pinned to zero when
        # solving the calibration linear system, which makes
        # TestCalibratedRatingsView flaky under the default random seed.
        env:
          PYTHONHASHSEED: "0"
        run: python manage.py test
